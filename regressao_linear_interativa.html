
<h2 class="sr-only">Widget interativo de regressão linear — arraste os pontos para ver a reta se ajustar</h2>

<style>
  .reg-root { padding: 1rem 0; font-family: var(--font-sans); }
  .stats-row { display: flex; gap: 12px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.6rem 1rem; min-width: 110px; }
  .stat-label { font-size: 12px; color: var(--color-text-secondary); margin: 0 0 2px; }
  .stat-val { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin: 0; }
  .canvas-wrap { position: relative; width: 100%; }
  canvas#rc { display: block; width: 100%; cursor: crosshair; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); }
  .hint { font-size: 12px; color: var(--color-text-secondary); margin-top: 8px; }
  .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  button.reg-btn { font-size: 13px; padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); cursor: pointer; }
  button.reg-btn:hover { background: var(--color-background-secondary); }
  .formula-box { margin-top: 1rem; padding: 0.75rem 1rem; border-left: 3px solid #378ADD; border-radius: 0; background: var(--color-background-secondary); font-size: 14px; color: var(--color-text-primary); font-family: var(--font-mono); }
  .residual-toggle { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; }
  input[type=checkbox] { accent-color: #378ADD; width: 15px; height: 15px; cursor: pointer; }
</style>

<div class="reg-root">
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><p class="stat-label">inclinação (a)</p><p class="stat-val" id="sA">—</p></div>
    <div class="stat-card"><p class="stat-label">intercepto (b)</p><p class="stat-val" id="sB">—</p></div>
    <div class="stat-card"><p class="stat-label">R² (ajuste)</p><p class="stat-val" id="sR2">—</p></div>
    <div class="stat-card"><p class="stat-label">pontos</p><p class="stat-val" id="sN">0</p></div>
  </div>

  <div class="canvas-wrap">
    <canvas id="rc" height="340"></canvas>
  </div>

  <div class="hint">Clique para adicionar pontos · Arraste para mover · Clique duplo para remover</div>

  <label class="residual-toggle">
    <input type="checkbox" id="showRes"> mostrar resíduos (erros)
  </label>

  <div class="btn-row">
    <button class="reg-btn" onclick="addPreset()">carregar exemplo (estudo × nota)</button>
    <button class="reg-btn" onclick="clearAll()">limpar tudo</button>
    <button class="reg-btn" onclick="sendPrompt('Como calcular os coeficientes a e b manualmente com os mínimos quadrados?')">como calcular a e b? ↗</button>
  </div>

  <div class="formula-box" id="formulaBox" style="display:none"></div>
</div>

<script>
const canvas = document.getElementById('rc');
const ctx = canvas.getContext('2d');
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;

const PAD = 48;
let points = [];
let dragging = null;
let showRes = false;

document.getElementById('showRes').addEventListener('change', e => { showRes = e.target.checked; draw(); });

const XMIN = 0, XMAX = 10, YMIN = 0, YMAX = 10;

function toCanvas(px, py) {
  const w = canvas.width, h = canvas.height;
  return [PAD + (px - XMIN) / (XMAX - XMIN) * (w - PAD*2),
          h - PAD - (py - YMIN) / (YMAX - YMIN) * (h - PAD*2)];
}
function fromCanvas(cx, cy) {
  const w = canvas.width, h = canvas.height;
  return [(cx - PAD) / (w - PAD*2) * (XMAX - XMIN) + XMIN,
          (h - PAD - cy) / (h - PAD*2) * (YMAX - YMIN) + YMIN];
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 340 * dpr;
  canvas.style.height = '340px';
  ctx.scale(dpr, dpr);
}
resize();
window.addEventListener('resize', () => { resize(); draw(); });

function regression(pts) {
  if (pts.length < 2) return null;
  const n = pts.length;
  const mx = pts.reduce((s,p) => s+p[0],0)/n;
  const my = pts.reduce((s,p) => s+p[1],0)/n;
  const num = pts.reduce((s,p) => s+(p[0]-mx)*(p[1]-my),0);
  const den = pts.reduce((s,p) => s+(p[0]-mx)**2,0);
  if (den === 0) return null;
  const a = num/den;
  const b = my - a*mx;
  const yhat = pts.map(p => a*p[0]+b);
  const sstot = pts.reduce((s,p) => s+(p[1]-my)**2,0);
  const ssres = pts.reduce((s,p,i) => s+(p[1]-yhat[i])**2,0);
  const r2 = sstot === 0 ? 1 : 1 - ssres/sstot;
  return {a, b, r2};
}

function draw() {
  const W = canvas.width / (window.devicePixelRatio||1);
  const H = canvas.height / (window.devicePixelRatio||1);
  ctx.clearRect(0,0,W,H);

  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  const axisColor = isDark ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.25)';
  const textColor = isDark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.45)';

  ctx.strokeStyle = gridColor;
  ctx.lineWidth = 1;
  for (let i=1; i<=9; i++) {
    const [gx] = toCanvas(i,0); const [,gy] = toCanvas(0,i);
    ctx.beginPath(); ctx.moveTo(gx,PAD); ctx.lineTo(gx,H-PAD); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(PAD,gy); ctx.lineTo(W-PAD,gy); ctx.stroke();
  }

  ctx.strokeStyle = axisColor;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  const [ax0,ay0] = toCanvas(XMIN,YMIN);
  const [ax1] = toCanvas(XMAX,YMIN);
  const [,ay1] = toCanvas(XMIN,YMAX);
  ctx.moveTo(ax0,ay0); ctx.lineTo(ax1,ay0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ax0,ay0); ctx.lineTo(ax0,ay1); ctx.stroke();

  ctx.fillStyle = textColor;
  ctx.font = '11px var(--font-sans, sans-serif)';
  ctx.textAlign = 'center';
  for (let i=0;i<=10;i+=2) {
    const [gx] = toCanvas(i,0);
    ctx.fillText(i, gx, H-PAD+16);
  }
  ctx.textAlign = 'right';
  for (let i=0;i<=10;i+=2) {
    const [,gy] = toCanvas(0,i);
    ctx.fillText(i, PAD-8, gy+4);
  }

  ctx.fillStyle = textColor;
  ctx.font = '12px var(--font-sans, sans-serif)';
  ctx.textAlign = 'center';
  ctx.fillText('x (horas de estudo)', W/2, H-6);
  ctx.save(); ctx.translate(13, H/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('y (nota)', 0, 0); ctx.restore();

  const reg = regression(points);

  if (reg && points.length >= 2) {
    const xA = XMIN, xB = XMAX;
    const yA = reg.a*xA+reg.b, yB = reg.a*xB+reg.b;
    const [px0,py0] = toCanvas(xA, clamp(yA,YMIN,YMAX));
    const [px1,py1] = toCanvas(xB, clamp(yB,YMIN,YMAX));

    if (showRes) {
      points.forEach(p => {
        const yh = reg.a*p[0]+reg.b;
        const [cx,cy] = toCanvas(p[0],p[1]);
        const [,chy] = toCanvas(p[0],yh);
        ctx.strokeStyle = '#E24B4A55';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([3,3]);
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx,chy); ctx.stroke();
        ctx.setLineDash([]);
      });
    }

    ctx.strokeStyle = '#378ADD';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(px0,py0); ctx.lineTo(px1,py1); ctx.stroke();

    document.getElementById('sA').textContent = reg.a.toFixed(2);
    document.getElementById('sB').textContent = reg.b.toFixed(2);
    document.getElementById('sR2').textContent = reg.r2.toFixed(3);

    const fb = document.getElementById('formulaBox');
    fb.style.display = 'block';
    fb.textContent = `y = ${reg.a.toFixed(2)}x + (${reg.b.toFixed(2)})`;
  } else {
    document.getElementById('sA').textContent = '—';
    document.getElementById('sB').textContent = '—';
    document.getElementById('sR2').textContent = '—';
    document.getElementById('formulaBox').style.display = 'none';
  }

  document.getElementById('sN').textContent = points.length;

  points.forEach(p => {
    const [cx,cy] = toCanvas(p[0],p[1]);
    ctx.beginPath();
    ctx.arc(cx, cy, 7, 0, Math.PI*2);
    ctx.fillStyle = '#D85A30';
    ctx.fill();
    ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.15)' : 'white';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / (window.devicePixelRatio||1) / rect.width;
  const scaleY = canvas.height / (window.devicePixelRatio||1) / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return [(src.clientX - rect.left)*scaleX, (src.clientY - rect.top)*scaleY];
}

function nearestPoint(cx, cy, thresh=16) {
  let best = null, bestD = Infinity;
  points.forEach((p,i) => {
    const [px,py] = toCanvas(p[0],p[1]);
    const d = Math.hypot(cx-px, cy-py);
    if (d < thresh && d < bestD) { bestD = d; best = i; }
  });
  return best;
}

canvas.addEventListener('mousedown', e => {
  const [cx,cy] = getPos(e);
  const idx = nearestPoint(cx,cy);
  if (idx !== null) { dragging = idx; return; }
  const [fx,fy] = fromCanvas(cx,cy);
  if (fx<XMIN||fx>XMAX||fy<YMIN||fy>YMAX) return;
  points.push([parseFloat(fx.toFixed(2)), parseFloat(fy.toFixed(2))]);
  draw();
});
canvas.addEventListener('mousemove', e => {
  if (dragging === null) return;
  const [cx,cy] = getPos(e);
  const [fx,fy] = fromCanvas(cx,cy);
  points[dragging] = [clamp(parseFloat(fx.toFixed(2)),XMIN,XMAX), clamp(parseFloat(fy.toFixed(2)),YMIN,YMAX)];
  draw();
});
canvas.addEventListener('mouseup', () => { dragging = null; });
canvas.addEventListener('mouseleave', () => { dragging = null; });
canvas.addEventListener('dblclick', e => {
  const [cx,cy] = getPos(e);
  const idx = nearestPoint(cx,cy);
  if (idx !== null) { points.splice(idx,1); draw(); }
});

canvas.addEventListener('touchstart', e => { e.preventDefault(); const [cx,cy]=getPos(e); const idx=nearestPoint(cx,cy,24); if(idx!==null){dragging=idx;return;} const[fx,fy]=fromCanvas(cx,cy); if(fx<XMIN||fx>XMAX||fy<YMIN||fy>YMAX)return; points.push([parseFloat(fx.toFixed(2)),parseFloat(fy.toFixed(2))]); draw(); },{passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); if(dragging===null)return; const[cx,cy]=getPos(e); const[fx,fy]=fromCanvas(cx,cy); points[dragging]=[clamp(parseFloat(fx.toFixed(2)),XMIN,XMAX),clamp(parseFloat(fy.toFixed(2)),YMIN,YMAX)]; draw(); },{passive:false});
canvas.addEventListener('touchend', () => { dragging = null; });

function addPreset() {
  points = [[1,3],[1.5,4],[2,3.5],[2.5,5],[3,4.5],[4,6],[4.5,5.5],[5,7],[6,6.5],[7,8],[8,8.5],[9,9]];
  draw();
}
function clearAll() { points = []; draw(); }

draw();
</script>
